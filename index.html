<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Meditation</title>

<!-- PWA: enables full-screen app mode when launched from iPhone home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Daily Meditation">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1C1917">

<!-- Home screen icon (shown on iPhone when added to home screen) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%231C1917'/%3E%3Ctext x='90' y='115' font-family='Georgia,serif' font-size='90' text-anchor='middle' fill='%2392711A'%3E%E2%80%9C%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #F5F0E8;
    --paper: #FDFAF4;
    --ink: #1C1917;
    --ink-light: #44403C;
    --ink-muted: #78716C;
    --gold: #92711A;
    --gold-light: #B8902A;
    --accent-bg: #FDF3DC;
    --border: #E2D9C8;
    --shadow: rgba(28,25,23,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px 0;
  }

  /* Header */
  .header {
    width: 100%;
    background: var(--ink);
    color: var(--bg);
    text-align: center;
    padding: 18px 24px 14px;
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px var(--shadow);
  }

  .header-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.65;
    margin-bottom: 2px;
  }

  .header-date {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.04em;
    opacity: 0.9;
  }

  .header-cycle {
    font-size: 11px;
    opacity: 0.4;
    margin-top: 2px;
    letter-spacing: 0.1em;
  }

  /* Card */
  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 4px;
    max-width: 560px;
    width: calc(100% - 32px);
    margin: 28px auto 0;
    padding: 36px 32px 32px;
    box-shadow: 0 4px 20px var(--shadow);
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Quote */
  .quote-block {
    border-left: 3px solid var(--gold);
    padding-left: 20px;
    margin-bottom: 28px;
  }

  .quote-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.55;
    color: var(--ink);
    font-style: italic;
    margin-bottom: 14px;
  }

  .quote-attr {
    font-size: 13px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  /* Framing */
  .framing-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .framing-text {
    font-size: 16px;
    line-height: 1.75;
    color: var(--ink);
    font-weight: 400;
  }

  /* Prompt */
  .prompt-block {
    background: var(--accent-bg);
    border: 1px solid #E8D9A8;
    border-radius: 3px;
    padding: 20px 22px;
    margin-top: 28px;
  }

  .prompt-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .prompt-text {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink);
  }

  /* Navigation */
  .nav {
    max-width: 560px;
    width: calc(100% - 32px);
    margin: 20px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--ink-muted);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 11px 20px;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
  }

  .nav-btn:hover {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .nav-btn:disabled:hover {
    background: none;
    color: var(--ink-muted);
    border-color: var(--border);
  }

  .nav-today {
    font-size: 12px;
    color: var(--ink-muted);
    text-align: center;
    cursor: pointer;
    padding: 6px 10px;
    text-decoration: underline;
    text-underline-offset: 3px;
    white-space: nowrap;
  }

  .nav-today:hover { color: var(--gold); }

  /* Copy */
  .copy-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--ink-muted);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 22px;
    padding: 0;
    transition: color 0.2s;
  }

  .copy-btn:hover { color: var(--gold); }
  .copy-btn svg { width: 14px; height: 14px; }

  .copied-msg {
    font-size: 12px;
    color: var(--gold);
    margin-top: 8px;
    height: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: var(--ink-muted);
    opacity: 0.5;
    letter-spacing: 0.08em;
  }

  @media (max-width: 420px) {
    .card { padding: 28px 22px 24px; }
    .quote-text { font-size: 19px; }
    .framing-text { font-size: 15px; }
    .prompt-text { font-size: 16px; }
    .nav-btn { padding: 10px 12px; font-size: 13px; }
  }

  .card-actions {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  .card-actions .copy-btn { margin-top: 0; }

</style>
</head>
<body>

<div class="header">
  <div class="header-title">Daily Meditation</div>
  <div class="header-date" id="headerDate"></div>
  <div class="header-cycle" id="headerCycle"></div>
</div>

<div class="card" id="card">
  <div class="quote-block">
    <div class="quote-text" id="quoteText"></div>
    <div class="quote-attr" id="quoteAttr"></div>
  </div>

  <div class="divider"></div>

  <div class="framing-label">Context</div>
  <div class="framing-text" id="framingText"></div>

  <div class="prompt-block">
    <div class="prompt-label">&#9670; Winning Streak</div>
    <div class="prompt-text" id="promptText"></div>
  </div>

  <div class="card-actions">
    <button class="copy-btn" onclick="copyQuote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy Quote
    </button>
    <button class="copy-btn" id="speakBtn" onclick="speak()">
      <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5,3 19,12 5,21"/></svg>
      Read Aloud
    </button>
  </div>
  <div class="copied-msg" id="copiedMsg"></div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="navigate(-1)">&#8592; Previous</button>
  <span class="nav-today" onclick="goToday()">Today</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">Next &#8594;</button>
</div>

<div class="footer">180-day cycle &nbsp;&bull;&nbsp; Repeats every six months</div>

<script src="quotes.js"></script>
<script src="app.js"></script>
</body>
</html>
